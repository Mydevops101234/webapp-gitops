apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-gitops-config
  namespace: default
data:
  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
      }
    }
