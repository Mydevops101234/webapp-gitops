apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-gitops
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp-gitops
  template:
    metadata:
      labels:
        app: webapp-gitops
    spec:
      containers:
      - name: webapp
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
